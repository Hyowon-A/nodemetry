spring:
  application:
    name: nodemetry-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

mqtt:
  enabled: ${MQTT_ENABLED:false}
  host: ${MQTT_HOST}
  port: ${MQTT_PORT:8883}
  username: ${MQTT_USERNAME}
  password: ${MQTT_PASSWORD}
  client-id: ${MQTT_CLIENT_ID:nodemetry-backend-local}
  telemetry-topic: nodemetry/+/telemetry
  status-topic: nodemetry/+/status

app:
  frontend:
    allowed-origins: ${FRONTEND_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
