spring:
  application:
    name: nodemetry-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

mqtt:
  host: ${MQTT_HOST}
  port: ${MQTT_PORT:8883}
  username: ${MQTT_USERNAME}
  password: ${MQTT_PASSWORD}
  client-id: ${MQTT_CLIENT_ID:nodemetry-backend-local}
  telemetry-topic: nodemetry/+/telemetry
  status-topic: nodemetry/+/status