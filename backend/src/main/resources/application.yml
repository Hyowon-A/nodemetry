spring:
  application:
    name: nodemetry-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 30000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

mqtt:
  enabled: ${MQTT_ENABLED:false}
  host: ${MQTT_HOST}
  port: ${MQTT_PORT:8883}
  username: ${MQTT_USERNAME}
  password: ${MQTT_PASSWORD}
  client-id: ${MQTT_CLIENT_ID:nodemetry-backend-local}
  telemetry-topic: nodemetry/+/telemetry
  status-topic: nodemetry/+/status

telemetry:
  ingest:
    queue-capacity: ${TELEMETRY_INGEST_QUEUE_CAPACITY:50000}
    batch-size: ${TELEMETRY_INGEST_BATCH_SIZE:500}
    flush-interval-ms: ${TELEMETRY_INGEST_FLUSH_INTERVAL_MS:100}

app:
  http-api:
    read-only: ${HTTP_API_READ_ONLY:false}
  frontend:
    allowed-origins: ${FRONTEND_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

---
spring:
  config:
    activate:
      on-profile: "prod | production"

app:
  http-api:
    read-only: ${HTTP_API_READ_ONLY:true}
